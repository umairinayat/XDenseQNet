# EfficientNet-B0 + CBAM + 4-Qubit 2-Layer Hybrid QNN
# 92.50% accuracy on MSLD v2.0

model:
  backbone: efficientnet_b0
  num_classes: 4
  n_qubits: 4
  n_layers: 2
  dropout_rate: 0.5
  use_attention: true
  freeze_last_layer: true

data:
  dataset_path: "data/MSLD_v2"
  processed_path: "data/processed"
  image_size: [224, 224]
  batch_size: 16
  num_workers: 0

phase1:
  epochs: 30
  learning_rate: 0.001
  weight_decay: 0.001

phase2:
  epochs: 80
  learning_rate: 0.0008
  weight_decay: 0.001
  patience: 20
  label_smoothing: 0.1
  focal_gamma: 2.0
  unfreeze_epoch: 15

seed: 42
